<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSRI Ecosystem Map</title>
  <style>
    :root{--ink:#15202b;--ink-2:#2a3a4a;--paper:#f4efe6;--paper-2:#ebe4d6;--rule:#15202b;--accent:#b54f2a;--accent-2:#c49a3f;--accent-3:#2f5d4f;--accent-4:#3a4f7a;--muted:#7a7060}
    *{box-sizing:border-box} body{margin:0;background:var(--paper);font-family:system-ui,sans-serif;color:var(--ink)}
    .page{max-width:1400px;margin:0 auto;padding:32px}
    .masthead{text-align:center;border-bottom:1px solid var(--rule);padding-bottom:16px}
    .masthead h1{font-family:Georgia,serif;font-size:42px;font-weight:400;margin:0}.masthead em{color:var(--accent)}
    .stage{display:grid;grid-template-columns:220px 1fr 260px;gap:24px;margin-top:24px}
    .legend-item{padding:8px;cursor:pointer}.legend-item.active{background:var(--paper-2)}
    .swatch{width:12px;height:12px;display:inline-block;margin-right:8px;border:1px solid var(--rule)}
    .r1{background:var(--accent)}.r2{background:var(--accent-2)}.r3{background:var(--accent-3)}.r4{background:var(--accent-4)}
    svg{width:100%;max-width:760px;display:block;margin:auto} .node{cursor:pointer}
    .node circle{fill:var(--paper);stroke-width:2}.node.r1 circle{stroke:var(--accent)}.node.r2 circle{stroke:var(--accent-2)}.node.r3 circle{stroke:var(--accent-3)}.node.r4 circle{stroke:var(--accent-4)}
    .node.active circle,.node:hover circle{fill:currentColor}.node.r1{color:var(--accent)}.node.r2{color:var(--accent-2)}.node.r3{color:var(--accent-3)}.node.r4{color:var(--accent-4)}
    .node text{font-family:Georgia,serif;font-size:12px;fill:var(--ink)} .ring{fill:none;stroke:var(--rule);stroke-dasharray:3 5;opacity:.35}
    .detail{border:1px solid var(--rule);background:var(--paper-2);padding:16px;min-height:300px}
    .detail h2{margin:0 0 8px;font-family:Georgia,serif;font-weight:400}
    @media (max-width:1100px){.stage{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page">
  <header class="masthead"><h1>The CSRI <em>Ecosystem</em> Map</h1></header>
  <div class="stage">
    <aside>
      <div class="legend-item" data-ring="1"><span class="swatch r1"></span>Surrounded by</div>
      <div class="legend-item" data-ring="2"><span class="swatch r2"></span>Embedded in</div>
      <div class="legend-item" data-ring="3"><span class="swatch r3"></span>Delivering</div>
      <div class="legend-item" data-ring="4"><span class="swatch r4"></span>Contributing to</div>
    </aside>
    <main>
      <svg viewBox="-360 -360 720 720" id="map"></svg>
    </main>
    <aside class="detail" id="detail"><h2>CSRI</h2><p>Wybierz węzeł lub warstwę.</p></aside>
  </div>
</div>
<script>
const data={rings:[
{ring:1,label:'Surrounded by',nodes:[['Industry',0],['Science',120],['Public',240]]},
{ring:2,label:'Embedded in',nodes:[['Horizon',40],['EIT',200]]},
{ring:3,label:'Delivering',nodes:[['Projects',20],['Pilots',140],['Training',260]]},
{ring:4,label:'Contributing to',nodes:[['Impact',340],['Policy',100],['Jobs',220]]}
]};
const radii=[120,190,255,320];
const svg=document.getElementById('map');
svg.innerHTML=`<circle class='ring' r='120'/><circle class='ring' r='190'/><circle class='ring' r='255'/><circle class='ring' r='320'/><circle r='62' fill='#15202b'/><text x='0' y='8' fill='#f4efe6' text-anchor='middle' font-family='Georgia' font-style='italic' font-size='30'>CSRI</text>`;
for(const r of data.rings){ for(const [name,a] of r.nodes){ const rad=a*Math.PI/180,x=Math.cos(rad)*radii[r.ring-1],y=Math.sin(rad)*radii[r.ring-1];
  const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class',`node r${r.ring}`); g.dataset.ring=r.ring; g.dataset.name=name;
  g.setAttribute('transform',`translate(${x} ${y})`); g.innerHTML=`<circle r='20'></circle><text y='38' text-anchor='middle'>${name}</text>`; svg.appendChild(g);
}}
function selectRing(r){document.querySelectorAll('.legend-item').forEach(el=>el.classList.toggle('active',+el.dataset.ring===r));document.querySelectorAll('.node').forEach(n=>n.classList.toggle('active',+n.dataset.ring===r));document.getElementById('detail').innerHTML=`<h2>${data.rings[r-1].label}</h2><p>Warstwa ${r} ekosystemu CSRI.</p>`;}
function selectNode(n){document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));n.classList.add('active');document.querySelectorAll('.legend-item').forEach(el=>el.classList.toggle('active',el.dataset.ring===n.dataset.ring));document.getElementById('detail').innerHTML=`<h2>${n.dataset.name}</h2><p>Element warstwy ${n.dataset.ring}.</p>`;}
document.querySelectorAll('.legend-item').forEach(el=>el.onclick=()=>selectRing(+el.dataset.ring));document.querySelectorAll('.node').forEach(n=>n.onclick=()=>selectNode(n));
</script>
</body></html>
